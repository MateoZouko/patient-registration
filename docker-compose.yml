version: "3.9"

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-patients_db}
      POSTGRES_USER: ${POSTGRES_USER:-patients_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-patients_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-patients_user} -d ${POSTGRES_DB:-patients_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_KEY: ""
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: ${POSTGRES_DB:-patients_db}
      DB_USERNAME: ${POSTGRES_USER:-patients_user}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-patients_pass}
      MAIL_MAILER: smtp
      MAIL_HOST: ${MAIL_HOST:-sandbox.smtp.mailtrap.io}
      MAIL_PORT: ${MAIL_PORT:-2525}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_FROM_ADDRESS: ${MAIL_FROM:-noreply@patients.dev}
      MAIL_FROM_NAME: "Patient Registration"
      QUEUE_CONNECTION: database
      CORS_ALLOWED_ORIGIN: "http://localhost:3000"
    volumes:
      - uploads_data:/app/storage/app/public/uploads
    ports:
      - "5000:8000"
    depends_on:
      db:
        condition: service_healthy

  queue-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    entrypoint: ["sh", "-c", "until php artisan migrate:status > /dev/null 2>&1; do echo '[worker] Waiting for migrations...'; sleep 3; done && php artisan queue:work --sleep=3 --tries=3"]
    environment:
      APP_ENV: local
      APP_KEY: ""
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: ${POSTGRES_DB:-patients_db}
      DB_USERNAME: ${POSTGRES_USER:-patients_user}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-patients_pass}
      MAIL_MAILER: smtp
      MAIL_HOST: ${MAIL_HOST:-sandbox.smtp.mailtrap.io}
      MAIL_PORT: ${MAIL_PORT:-2525}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_FROM_ADDRESS: ${MAIL_FROM:-noreply@patients.dev}
      MAIL_FROM_NAME: "Patient Registration"
      QUEUE_CONNECTION: database
    volumes:
      - uploads_data:/app/storage/app/public/uploads
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:5000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  uploads_data:
